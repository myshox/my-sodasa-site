                        })

                            handleAudioError(); 
                        });
                }
            };

            const quillRef = useRef(null);
            const editorRef = useRef(null);

            useEffect(() => {
                if (!editorRef.current && quillRef.current && window.Quill) {
                    const quill = new window.Quill(quillRef.current, {
                        theme: 'snow',
                        modules: {
                            toolbar: [
                                [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'align': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['blockquote', 'code-block'],
                                ['link', 'image'],
                                ['clean']
                            ]
                        },
                        placeholder: '在此貼上您的內容...\n支援從 Word 直接複製貼上（Ctrl+V）'
                    });

                    if (guide?.content) {
                        quill.root.innerHTML = guide.content;
                    }

                    quill.getModule('toolbar').addHandler('image', () => {
                        const input = document.createElement('input');
                        input.setAttribute('type', 'file');
                        input.setAttribute('accept', 'image/*');
                        input.click();

                        input.onchange = async () => {
                            const file = input.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    const range = quill.getSelection();
                                    quill.insertEmbed(range.index, 'image', e.target.result);
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                    });

                    editorRef.current = quill;
                }

            const handleWordUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                if (!file.name.endsWith('.docx')) {
                    showToast('請上傳 .docx 格式的 Word 文件', 'warning');
                    return;
                }

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await window.mammoth.convertToHtml({ arrayBuffer });
                    
                    if (editorRef.current) {
                        editorRef.current.root.innerHTML = result.value;
                        showToast('Word 文件已成功載入', 'success');
                    }

                    if (result.messages.length > 0) {
                        console.log('轉換訊息:', result.messages);
                    }
                } catch (error) {
                    console.error('上傳失敗:', error);
                    showToast('上傳失敗：' + error.message, 'error');

                event.target.value = '';

                        </div>

                    const { data, error } = await supabase
                        .from('guides')

                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setGuides(data || []);
                } catch (error) {
                    console.error('載入攻略失敗:', error);
                    showToast('載入攻略失敗', 'error');

                }

            };

                    if (error) throw error;

                    showToast('刪除成功', 'success');
                    loadGuides();

                        console.log('遊戲帳號列表:', accounts);

                        console.log('載入完成');

                        console.error('載入失敗:', error);

            const saveSponsorshipRecord = async () => {
                const selectedAccount = gameAccounts.find(acc => acc.id === selectedAccountId);
                
                try {
                    // 取得 IP 位置資訊
                    const ipData = await getIpLocation();
                    
                    // 準備插入資料
                    const insertData = {
                        user_id: user.id,
                        email: user.email,
                        game_account: selectedAccount?.name || '',
                        line_name: lineName || null,
                        amount: selectedPlan.amount,
                        coins: selectedPlan.total,

                        payment_method: selectedMethod,

                        ip_address: ipData?.ip || null
                    };
                    
                    // 只有當 ipData 存在且有效時才加入 ip_location
                    if (ipData && ipData.country) {
                        insertData.ip_location = JSON.stringify({

                            city: ipData.city || '',
                            region: ipData.region || ''
                        });

                    // 儲存到新的 donations 表

                    if (error) {
                        console.error('儲存贊助紀錄失敗:', error);

                { value: 'monthly', label: '月訂', color: 'text-purple-400 bg-purple-500/20 border-purple-500/50' },
            ];
            
            const getTagColor = (tag) => {
                const option = TAG_OPTIONS.find(opt => opt.value === tag);
                return option ? option.color : 'text-stone-400 bg-stone-500/20 border-stone-500/50';
            };
            
            // 批次操作：全選/取消全選
            const toggleSelectAll = () => {
                if (selectedIds.length === paginatedData.length) {
                    setSelectedIds([]);
                } else {
                    setSelectedIds(paginatedData.map(d => d.id));
                }
            };
            
            // 批次操作：切換單個選擇
            const toggleSelect = (id) => {
                setSelectedIds(prev => 
                    prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
                );
            };
            
            // 批次更新狀態
            const batchUpdateStatus = async (newStatus) => {
                if (selectedIds.length === 0) {
                    showToast('請先選擇項目', 'error');
                    return;
                }
                
                showConfirm(
                    '批次更新狀態',
                    `確定要將 ${selectedIds.length} 筆紀錄更新為「${newStatus === 'completed' ? '已完成' : newStatus === 'pending' ? '待處理' : '已取消'}」嗎？`,
                    async () => {
                        try {
                            const updateData = { 
                                status: newStatus,
                                updated_at: new Date().toISOString()
                            };
                            
                            if (newStatus === 'completed') {
                                updateData.processed_at = new Date().toISOString();
                            }
                            
                            const { error } = await supabase
                                .from('donations')
                                .update(updateData)
                                .in('id', selectedIds);
                            
                            if (error) {
                                console.error('批次更新失敗:', error);
                                showToast('批次更新失敗', 'error');
                                return;
                            }
                            
                            setData(data.map(item => 
                                selectedIds.includes(item.id) ? { ...item, ...updateData } : item
                            ));
                            
                            await logAction('update', 'donation', null, `批次更新 ${selectedIds.length} 筆紀錄狀態為：${newStatus}`);
                            showToast(`已更新 ${selectedIds.length} 筆紀錄`, 'success');
                            setSelectedIds([]);
                            hideConfirm();
                        } catch (err) {
                            console.error('批次更新異常:', err);
                            showToast('發生錯誤', 'error');
                            hideConfirm();
                        }
                    }

            };
            
            // 批次刪除
            const batchDelete = async () => {
                if (selectedIds.length === 0) {

                    return;

                showConfirm(
                    '批次刪除',
                    `確定要刪除 ${selectedIds.length} 筆紀錄嗎？此操作無法復原。`,

                        try {
                            const { error } = await supabase
                                .from('donations')
                                .delete()
                                .in('id', selectedIds);
                            
                            if (error) {
                                console.error('批次刪除失敗:', error);
                                showToast('批次刪除失敗', 'error');
                                return;
                            }
                            
                            setData(data.filter(item => !selectedIds.includes(item.id)));
                            await logAction('delete', 'donation', null, `批次刪除 ${selectedIds.length} 筆紀錄`);

                            hideConfirm();

            // 批次添加標籤
            const batchAddTag = async (tag) => {
                if (selectedIds.length === 0) {
                    showToast('請先選擇項目', 'error');
                    return;
                }
                
                try {
                    let updatedCount = 0;
                    
                    for (const id of selectedIds) {
                        const donation = data.find(d => d.id === id);
                        if (!donation) continue;
                        
                        const currentTags = donation.tags || [];
                        if (!currentTags.includes(tag)) {
                            const newTags = [...currentTags, tag];
                            
                            const { error } = await supabase
                                .from('donations')
                                .update({ 
                                    tags: newTags,
                                    updated_at: new Date().toISOString()
                                })
                                .eq('id', id);
                            
                            if (!error) {
                                updatedCount++;
                                setData(prevData => prevData.map(item => 
                                    item.id === id ? { ...item, tags: newTags, updated_at: new Date().toISOString() } : item
                                ));
                            }
                        }
                    }
                    
                    if (updatedCount > 0) {
                        await logAction('update', 'donation', null, `批次為 ${updatedCount} 筆紀錄加入標籤：${tag}`);

                        showToast('所有選中的紀錄已有此標籤', 'info');

                    setSelectedIds([]);
                    setShowBatchActions(false);

                    console.error('批次添加標籤異常:', err);
                    showToast('發生錯誤', 'error');

            // 篩選資料（包含進階篩選）

                                    (item.email || '').toLowerCase().includes(searchTerm.toLowerCase());
                const matchStatus = filterStatus === 'all' || item.status === filterStatus;
                
                // 進階搜尋：日期範圍
                let matchDate = true;
                if (dateFrom) {
                    matchDate = matchDate && new Date(item.created_at) >= new Date(dateFrom);
                }
                if (dateTo) {
                    matchDate = matchDate && new Date(item.created_at) <= new Date(dateTo + 'T23:59:59');
                }

                let matchAmount = true;
                if (amountMin !== '') {

                if (amountMax !== '') {
                    matchAmount = matchAmount && item.amount <= Number(amountMax);

                // 進階搜尋：標籤
                const matchTag = filterTag === 'all' || (item.tags || []).includes(filterTag);
                
                return matchSearch && matchStatus && matchDate && matchAmount && matchPayment && matchTag;
